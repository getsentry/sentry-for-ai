name: Flue Skill Drift Updater

on:
  issues:
    types: [labeled, opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: number

concurrency:
  group: flue-skill-drift-updater-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  update:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'skill-drift'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: read
    outputs:
      result: ${{ steps.run-updater.outputs.result }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
      issue_number: ${{ steps.issue.outputs.issue_number }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Resolve issue payload
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ inputs.issue_number }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi
          gh issue view "$ISSUE_NUMBER" --json number,title,body,url > /tmp/issue.json
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
      - name: Run Flue Updater
        id: run-updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_JSON=$(cat /tmp/issue.json)
          PAYLOAD=$(jq -c '{issue_number: .number, issue_title: .title, issue_body: .body, issue_url: .url}' <<<"$ISSUE_JSON")
          npx flue run skill-drift-updater --target node \
            --id "updater-${{ steps.issue.outputs.issue_number }}-$(date +%s)" \
            --payload "$PAYLOAD" \
            > result.json
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          cat result.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Post skip comment if agent skipped
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(jq -r '.status' result.json)
          if [ "$STATUS" = "skipped" ]; then
            REASON=$(jq -r '.reason' result.json)
            gh issue comment "${{ steps.issue.outputs.issue_number }}" \
              --body "Updater skipped: $REASON"
          fi
      - name: Capture patch
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            : > changes.patch
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --cached > changes.patch
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: updater-artifacts
          path: |
            result.json
            changes.patch
          retention-days: 14

  actuate:
    needs: update
    if: needs.update.outputs.has_changes == 'true' && fromJSON(needs.update.outputs.result).status == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: updater-artifacts
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Apply patch + open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Protected paths — must stay in sync with flue-skill-drift-detector.yml
          PROTECTED_PATTERN='^(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|flue\.config\.ts|AGENTS\.md|CLAUDE\.md|SKILL_TREE\.md|scripts/build-skill-tree\.sh|\.github/.*|\.agents/.*|\.flue/.*)$'

          ISSUE_NUMBER="${{ needs.update.outputs.issue_number }}"
          SKILL=$(jq -r '.skill' result.json)
          SUMMARY=$(jq -r '.summary' result.json)
          FILES_CHANGED=$(jq -r '.files_changed // [] | join("\n")' result.json)
          SDK_PR_REFS=$(jq -r '.sdk_pr_references // []' result.json)

          # Derive scope for commit message
          # sentry-node-sdk -> node-sdk, sentry-react-sdk -> react-sdk
          # If pattern doesn't match, use "skill"
          if [[ "$SKILL" =~ ^sentry-(.+)$ ]]; then
            SCOPE="${BASH_REMATCH[1]}"
          else
            SCOPE="skill"
          fi

          BRANCH="flue/skill-drift/${SKILL}-issue-${ISSUE_NUMBER}-$(date +%s)"

          git switch -c "$BRANCH" origin/main

          # Apply patch
          if ! git apply --check changes.patch 2>/tmp/apply-err; then
            echo "::error::Patch did not apply cleanly"
            cat /tmp/apply-err
            exit 1
          fi
          git apply changes.patch

          # Protected files check
          TOUCHED=$(git diff --name-only HEAD)
          VIOLATION=""
          while IFS= read -r path; do
            if [[ -n "$path" ]] && [[ "$path" =~ $PROTECTED_PATTERN ]]; then
              VIOLATION="$path"
              break
            fi
          done <<<"$TOUCHED"

          if [[ -n "$VIOLATION" ]]; then
            echo "::warning::Protected file touched ($VIOLATION) — commenting on issue and aborting"
            PATHS=$(echo "$TOUCHED" | grep -E "$PROTECTED_PATTERN" || true)
            gh issue comment "$ISSUE_NUMBER" \
              --body "The Updater proposed changes to protected files: \`$PATHS\`. Manual review needed."
            exit 0
          fi

          # Skill tree validator — regenerate then verify
          ./scripts/build-skill-tree.sh
          git add SKILL_TREE.md 2>/dev/null || true
          if ! ./scripts/build-skill-tree.sh --check 2>/tmp/skill-tree-err; then
            echo "::error::Skill tree validation failed after regeneration"
            ERR=$(cat /tmp/skill-tree-err)
            gh issue comment "$ISSUE_NUMBER" \
              --body "Skill tree validation failed after the Updater ran. Output:

          \`\`\`
          $ERR
          \`\`\`

          Please review manually."
            exit 0
          fi

          # Build SDK PR references body section
          SDK_REFS_BODY=""
          while IFS= read -r ref; do
            repo=$(echo "$ref" | jq -r '.repo // ""')
            number=$(echo "$ref" | jq -r '.number // ""')
            title=$(echo "$ref" | jq -r '.title // ""')
            url=$(echo "$ref" | jq -r '.url // ""')
            if [[ -n "$repo" && -n "$number" ]]; then
              SDK_REFS_BODY="${SDK_REFS_BODY}- ${repo}#${number} — ${title} (${url})
          "
            fi
          done < <(echo "$SDK_PR_REFS" | jq -c '.[]' 2>/dev/null || true)

          # Build files changed section
          FILES_BODY=""
          while IFS= read -r f; do
            if [[ -n "$f" ]]; then
              FILES_BODY="${FILES_BODY}- \`$f\`
          "
            fi
          done <<<"$FILES_CHANGED"

          # Commit message
          COMMIT_MSG="fix(${SCOPE}): ${SUMMARY}

          Closes #${ISSUE_NUMBER}

          ${SDK_REFS_BODY}
          Co-Authored-By: Claude (claude-opus-4-6 via Flue Updater)"

          git add -A
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH"

          # PR body
          PR_BODY="${SUMMARY}

          Closes #${ISSUE_NUMBER}

          ## SDK References

          ${SDK_REFS_BODY}
          ## Files Changed

          ${FILES_BODY}
          ---
          Generated by the Flue Updater agent. See [.flue/agents/skill-drift-updater.ts](../blob/main/.flue/agents/skill-drift-updater.ts)."

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "[skill-drift] fix(${SCOPE}): ${SUMMARY}" \
            --body "$PR_BODY" \
            --label "skill-drift" \
            --label "automated"
