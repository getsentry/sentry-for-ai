name: Evals

permissions:
  actions: read
  checks: write
  contents: read
  pull-requests: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "evals/**"
      - "skills/**"
      - ".github/workflows/evals.yml"
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/github-script@v7
        id: filter
        with:
          script: |
            const evalPaths = ['evals/', 'skills/', '.github/workflows/evals.yml'];

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('run', 'true');
              return;
            }

            if (context.eventName === 'push') {
              core.setOutput('run', 'true');
              return;
            }

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('run', 'false');
              return;
            }

            const labels = new Set((pr.labels ?? []).map(l => l.name));
            if (labels.has('run-evals')) {
              core.setOutput('run', 'true');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changed = files.some(f => evalPaths.some(p => f.filename.startsWith(p)));
            core.setOutput('run', changed ? 'true' : 'false');

  evals:
    needs: should-run
    if: >-
      needs.should-run.outputs.run == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANTHROPIC_API_KEY: ${{ secrets.EVAL_ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install eval dependencies
        working-directory: evals
        run: npm ci

      - name: Verify eval secret
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "EVAL_ANTHROPIC_API_KEY secret is required" >&2
            exit 1
          fi

      - name: Run evals
        working-directory: evals
        env:
          VITEST_EVALS_JSON: ../eval-results.json
        run: |
          set +e
          npm run evals
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::notice title=Eval failures::npm run evals exited $status"
          fi
          exit 0

      - name: Publish eval report
        if: ${{ !cancelled() && hashFiles('eval-results.json') != '' }}
        uses: getsentry/vitest-evals@v0.9.0-beta.6
        with:
          results: eval-results.json
          max-failures: 10
        continue-on-error: true
