name: Flue Skill Creator

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform / framework name (e.g. 'nuxt', 'tanstack-router', 'remix')"
        required: true
        type: string
      prompt:
        description: "Optional free-form guidance (e.g. 'focus on App Router compatibility')"
        required: false
        type: string

concurrency:
  group: flue-skill-creator-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      result: ${{ steps.run-creator.outputs.result }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
      status: ${{ steps.run-creator.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run Flue Skill Creator
        id: run-creator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          payload=$(jq -c -n --arg p "${{ inputs.platform }}" --arg q "${{ inputs.prompt }}" \
            '{platform: $p} + (if $q == "" then {} else {prompt: $q} end)')
          npx flue run skill-creator --target node \
            --id "creator-${{ inputs.platform }}-$(date +%s)" \
            --payload "$payload" \
            > result.json
          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          cat result.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          STATUS=$(jq -r '.status' result.json)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "skipped" ]; then
            REASON=$(jq -r '.reason' result.json)
            echo "::warning::Skill Creator skipped: $REASON"
          fi
      - name: Capture patch
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            : > changes.patch
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --cached > changes.patch
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: creator-artifacts
          path: |
            result.json
            changes.patch
          retention-days: 14

  actuate:
    needs: create
    if: needs.create.outputs.has_changes == 'true' && needs.create.outputs.status == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: creator-artifacts
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Apply patch + open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          set -euo pipefail

          # Protected paths — must stay in sync with flue-skill-drift-detector.yml and flue-skill-drift-updater.yml
          # NOTE: skills/** is intentionally NOT protected — the Creator legitimately writes under skills/
          PROTECTED_PATTERN='^(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|tsconfig\.json|flue\.config\.ts|AGENTS\.md|CLAUDE\.md|SKILL_TREE\.md|scripts/build-skill-tree\.sh|\.github/.*|\.agents/.*|\.flue/.*)$'

          SKILL=$(jq -r '.skill // ""' result.json)
          PLATFORM_INPUT=$(jq -r '.platform // ""' result.json)
          SUMMARY=$(jq -r '.summary // ""' result.json)
          FILES_CREATED=$(jq -r '.files_created // [] | join("\n")' result.json)
          FILES_MODIFIED=$(jq -r '.files_modified // [] | join("\n")' result.json)
          ROUTER_UPDATED=$(jq -r '.router_updated // "unknown"' result.json)

          # Validate required fields
          if [[ -z "$SKILL" ]]; then
            echo "::error::result.json missing 'skill' field — agent did not produce coherent output"
            exit 1
          fi

          # Sanitize platform for branch name
          safe_platform=$(echo "$PLATFORM" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9-' '-' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')

          BRANCH="flue/skill-creator/${safe_platform}-$(date +%s)"

          git switch -c "$BRANCH" origin/main

          # Apply patch (pre-check first)
          if ! git apply --check changes.patch 2>/tmp/apply-err; then
            echo "::error::Patch did not apply cleanly"
            cat /tmp/apply-err
            exit 1
          fi
          git apply changes.patch

          # Protected files check
          TOUCHED=$(git diff --name-only HEAD)
          VIOLATION=""
          while IFS= read -r path; do
            if [[ -n "$path" ]] && [[ "$path" =~ $PROTECTED_PATTERN ]]; then
              VIOLATION="$path"
              break
            fi
          done <<<"$TOUCHED"

          if [[ -n "$VIOLATION" ]]; then
            PROTECTED_PATHS=$(echo "$TOUCHED" | grep -E "$PROTECTED_PATTERN" || true)
            echo "::warning::Protected file(s) touched — opening review issue and aborting PR"
            gh issue create \
              --title "[skill-creator] Review needed: ${SKILL} creation touched protected paths" \
              --body "The Skill Creator agent attempted to create the \`${SKILL}\` skill bundle for \`${PLATFORM_INPUT}\` but touched protected file(s):

          \`\`\`
          ${PROTECTED_PATHS}
          \`\`\`

          **Summary:** ${SUMMARY}

          **Files the agent modified:**
          \`\`\`
          ${TOUCHED}
          \`\`\`

          This PR was blocked by the protected-files gate. Manual review and intervention is required." \
              --label "skill-creator" \
              --label "automated"
            exit 0
          fi

          # Skill tree validator — regenerate then verify
          ./scripts/build-skill-tree.sh
          git add SKILL_TREE.md 2>/dev/null || true
          if ! ./scripts/build-skill-tree.sh --check 2>/tmp/skill-tree-err; then
            echo "::error::Skill tree validation failed after Creator ran"
            ERR=$(cat /tmp/skill-tree-err)
            gh issue create \
              --title "[skill-creator] Skill tree validation failed for ${SKILL}" \
              --body "The Skill Creator agent produced a \`${SKILL}\` skill bundle for \`${PLATFORM_INPUT}\` but the skill tree validator failed. This likely means the agent did not properly register the skill in the router table.

          **Validator output:**
          \`\`\`
          $ERR
          \`\`\`

          **Summary:** ${SUMMARY}

          Manual intervention needed to register the skill in the router and re-run the validator." \
              --label "skill-creator" \
              --label "automated"
            exit 0
          fi

          # Build files created section
          FILES_CREATED_BODY=""
          while IFS= read -r f; do
            if [[ -n "$f" ]]; then
              FILES_CREATED_BODY="${FILES_CREATED_BODY}- \`$f\`
          "
            fi
          done <<<"$FILES_CREATED"

          # Build files modified section
          FILES_MODIFIED_BODY=""
          while IFS= read -r f; do
            if [[ -n "$f" ]]; then
              FILES_MODIFIED_BODY="${FILES_MODIFIED_BODY}- \`$f\`
          "
            fi
          done <<<"$FILES_MODIFIED"

          # Derive scope for commit message
          if [[ "$SKILL" =~ ^sentry-(.+)$ ]]; then
            SCOPE="${BASH_REMATCH[1]}"
          else
            SCOPE="$SKILL"
          fi

          # Commit
          git add -A
          git commit -m "feat(${SCOPE}): add new skill bundle for ${PLATFORM_INPUT}

          ${SUMMARY}

          Files created:
          ${FILES_CREATED_BODY}
          Files modified:
          ${FILES_MODIFIED_BODY}
          Router updated: ${ROUTER_UPDATED}

          Co-Authored-By: Claude (claude-opus-4-6 via Flue Creator)"

          git push origin "$BRANCH"

          # Open PR
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat(${SCOPE}): add new skill bundle for ${PLATFORM_INPUT}" \
            --body-file - <<EOF
          ${SUMMARY}

          ## Files Created

          ${FILES_CREATED_BODY}
          ## Files Modified

          ${FILES_MODIFIED_BODY}
          ## Details

          - **Skill:** \`${SKILL}\`
          - **Platform:** \`${PLATFORM_INPUT}\`
          - **Router updated:** \`${ROUTER_UPDATED}\`

          ---
          Generated by the Flue Skill Creator agent. See [.flue/agents/skill-creator.ts](../blob/main/.flue/agents/skill-creator.ts).
          EOF \
            --label "skill-drift" \
            --label "automated" \
            --label "skill-creator"
